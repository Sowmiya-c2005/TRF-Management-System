services:
  - type: web
    name: trf-management-system
    env: python
    region: singapore
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this in Render dashboard
      - key: SECRET_KEY
        sync: false          # Set this in Render dashboard
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REQUIRE_AUTH
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: APP_BASE_URL
        sync: false          # Set to your Render URL e.g. https://trf-management-system.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: UPLOADS_ROOT
        value: uploads
